version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: folio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-folio_db}
      POSTGRES_USER:     ${DB_USER:-folio_user}
      POSTGRES_PASSWORD: ${DB_PASS:-folio_pass}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-folio_user} -d ${DB_NAME:-folio_db}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: folio_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-folio_db}
      DB_USER:     ${DB_USER:-folio_user}
      DB_PASS:     ${DB_PASS:-folio_pass}
      PORT:        3000
      NODE_ENV:    development
      FRONTEND_URL: http://localhost:5173
    ports:
      - '3000:3000'
    volumes:
      - ./backend/src:/app/src
    command: npm run start:dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: folio_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:
