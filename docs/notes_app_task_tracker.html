
<!DOCTYPE html>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);background:transparent;color:var(--color-text-primary)}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.tracker{padding:1rem 0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.title{font-size:15px;font-weight:500}
.stats{display:flex;gap:10px}
.stat{font-size:12px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary);background:var(--color-background-secondary)}
.stat span{font-weight:500;color:var(--color-text-primary)}
.phase{margin-bottom:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.phase-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;background:var(--color-background-secondary)}
.phase-header:hover{background:var(--color-background-primary)}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.phase-title{font-size:13px;font-weight:500;flex:1}
.phase-meta{display:flex;align-items:center;gap:8px}
.phase-time{font-size:11px;color:var(--color-text-tertiary)}
.phase-prog{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.chevron{font-size:10px;color:var(--color-text-tertiary);transition:transform .2s}
.chevron.open{transform:rotate(90deg)}
.task-list{display:none;padding:6px 0}
.task-list.open{display:block}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:7px 14px 7px 32px;border-bottom:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background .1s}
.task-row:last-child{border-bottom:none}
.task-row:hover{background:var(--color-background-secondary)}
.task-check{width:15px;height:15px;border:0.5px solid var(--color-border-secondary);border-radius:3px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:9px}
.task-check.done{background:var(--color-background-success);border-color:transparent;color:var(--color-text-success)}
.task-body{flex:1;min-width:0}
.task-name{font-size:13px;color:var(--color-text-primary);line-height:1.4}
.task-name.done{text-decoration:line-through;color:var(--color-text-tertiary)}
.task-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px;line-height:1.5}
.task-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.b-blue{background:var(--color-background-info);color:var(--color-text-info)}
.b-green{background:var(--color-background-success);color:var(--color-text-success)}
.b-amber{background:var(--color-background-warning);color:var(--color-text-warning)}
.b-red{background:var(--color-background-danger);color:var(--color-text-danger)}
.b-gray{background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.min-label{font-size:10px;color:var(--color-text-tertiary);min-width:30px;text-align:right}
.progress-bar{height:3px;background:var(--color-border-tertiary);border-radius:2px;margin:8px 14px 4px}
.progress-fill{height:3px;border-radius:2px;transition:width .3s}
.subtask-list{display:none;padding:4px 0}
.subtask-list.open{display:block}
.subtask-row{display:flex;align-items:center;gap:8px;padding:5px 14px 5px 52px;cursor:pointer;transition:background .1s}
.subtask-row:hover{background:var(--color-background-secondary)}
.sub-check{width:12px;height:12px;border:0.5px solid var(--color-border-secondary);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .15s}
.sub-check.done{background:var(--color-background-success);border-color:transparent;color:var(--color-text-success)}
.sub-name{font-size:12px;color:var(--color-text-secondary)}
.sub-name.done{text-decoration:line-through;color:var(--color-text-tertiary)}
.sub-min{font-size:10px;color:var(--color-text-tertiary);margin-left:auto}
.expand-btn{font-size:10px;color:var(--color-text-tertiary);cursor:pointer;padding:1px 5px;border-radius:3px;border:0.5px solid var(--color-border-tertiary);background:transparent;line-height:1.4}
.expand-btn:hover{background:var(--color-background-secondary)}
.total-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-top:12px;font-size:12px;color:var(--color-text-secondary)}
.total-bar strong{font-weight:500;color:var(--color-text-primary)}
</style>
<h2 class="sr-only">Notes App Sprint — Full Task Tracker</h2>
<div class="tracker">
  <div class="header">
    <span class="title">Sprint Task Tracker</span>
    <div class="stats">
      <div class="stat">Tasks: <span id="s-done">0</span>/<span id="s-total">0</span></div>
      <div class="stat">Time left: <span id="s-time">0</span> min</div>
    </div>
  </div>
  <div id="phases"></div>
  <div class="total-bar">
    <span>Total estimated time</span>
    <strong id="total-time">—</strong>
  </div>
</div>
<script>
const phases = [
  {
    id:'p1', label:'Phase 1 — Planning & Design', color:'#378ADD', time:'0:00–2:30', badge:'b-blue',
    tasks:[
      { id:'t1', name:'Read & annotate exercise requirements', time:20, badge:'b-blue', tag:'Required',
        sub:['Highlight all hard constraints (SPA, layer separation, ORM, one-command script)','List 3 critical risks (Docker connectivity, CORS, time overrun)','Write acceptance criteria for Phase 1 pass','Note Phase 2 as bonus — never block Phase 1 on it'] },
      { id:'t2', name:'Finalise tech stack decision + rationale doc', time:20, badge:'b-blue', tag:'Required',
        sub:['Confirm: NestJS + TypeORM + PostgreSQL + React + Vite + Tailwind','Rule out TanStack Start — wrong fit for SPA isolation requirement','Rule out Django/Laravel — no built-in layer separation','Document each choice in DEVLOG.md with tradeoff framing','Confirm Node.js 20.x, npm 10.x, Docker 24.x versions'] },
      { id:'t3', name:'Write PRD (user stories + acceptance criteria)', time:25, badge:'b-blue', tag:'Required',
        sub:['Phase 1 stories: create, edit, delete, archive, unarchive, list active, list archived','Phase 2 stories: add/remove category, filter by category','Write acceptance criteria per story (what done looks like)','Define non-functional: REST API, relational DB, no mocks, SPA isolation'] },
      { id:'t4', name:'Design DB schema (TypeORM entities)', time:15, badge:'b-blue', tag:'Required',
        sub:['Note entity: id, title, content, archived, createdAt, updatedAt','Category entity: id, name (unique)','ManyToMany join: note_categories (auto-generated by TypeORM)','Validate schema satisfies Phase 2 filtering requirement'] },
      { id:'t5', name:'Define full REST API contract', time:20, badge:'b-blue', tag:'Required',
        sub:['GET /notes?archived=false — list active','GET /notes?archived=true — list archived','GET /notes?archived=false&categoryId=:id — filter by category (Phase 2)','POST /notes — create (title, content)','PUT /notes/:id — edit','DELETE /notes/:id — delete (204)','PATCH /notes/:id/archive — toggle archive','GET /categories — list all','POST /categories — create','POST /notes/:id/categories/:catId — add to note','DELETE /notes/:id/categories/:catId — remove from note','Decide HTTP status codes: 200, 201, 204, 400, 404, 500'] },
      { id:'t6', name:'UI/UX: wireframes + design system plan', time:25, badge:'b-blue', tag:'Required',
        sub:['Sketch Active Notes view: header tabs, note card grid, create button','Sketch Archived Notes view: same layout with Unarchive button','Sketch NoteForm modal: title input, content textarea, category pills (Phase 2)','Define color palette (CSS vars), typography, spacing scale','Define component list: NoteCard, NoteForm, NoteList, CategoryFilter, TabBar'] },
      { id:'t7', name:'System architecture diagram + folder structure', time:15, badge:'b-blue', tag:'Required',
        sub:['Confirm 3-tier: React SPA → NestJS REST → PostgreSQL','Confirm Docker Compose services: postgres, backend, frontend','Write out final folder structure (backend/src/notes/, frontend/src/)','Document data flow: user action → Axios call → controller → service → repo → DB'] },
      { id:'t8', name:'GitHub repo init + README skeleton + first commit', time:20, badge:'b-green', tag:'Git',
        sub:['Create private GitHub repo (given by HR)','git config user.name and user.email (no AI co-author)','Create folder structure: backend/, frontend/, docker-compose.yml, start.sh','Write README.md skeleton with all required sections','Add .gitignore: node_modules, .env, DEVLOG.md, claude.md, .claude/','Commit: feat: initial project scaffold'] },
    ]
  },
  {
    id:'p2b', label:'Phase 2a — Backend Build', color:'#1D9E75', time:'2:30–5:30', badge:'b-green',
    tasks:[
      { id:'t9', name:'NestJS scaffold + TypeORM + PostgreSQL config', time:30, badge:'b-green', tag:'Backend',
        sub:['nest new backend --package-manager npm','npm install @nestjs/typeorm typeorm pg class-validator class-transformer','Create .env with DB credentials','Configure TypeOrmModule.forRoot() in app.module.ts (synchronize: true for MVP)','Verify NestJS starts and connects to DB','Commit: feat: backend scaffold with TypeORM config'] },
      { id:'t10', name:'Note entity + NotesModule (controller/service/repo)', time:60, badge:'b-green', tag:'Backend',
        sub:['Create note.entity.ts with all fields + @Entity decorator','Create CreateNoteDto and UpdateNoteDto with class-validator decorators','Create notes.repository.ts — all DB access methods here only','Create notes.service.ts — business logic, calls repository','Create notes.controller.ts — HTTP only, calls service','Register NotesModule in app.module.ts','Commit: feat: notes CRUD controller/service/repository'] },
      { id:'t11', name:'Archive toggle endpoint', time:20, badge:'b-green', tag:'Backend',
        sub:['Add PATCH /notes/:id/archive in controller','Add toggleArchive(id) in service','Write test: curl PATCH, check archived flips','Commit: feat: archive/unarchive endpoint'] },
      { id:'t12', name:'Global config: ValidationPipe + CORS + error handling', time:20, badge:'b-green', tag:'Backend',
        sub:['app.useGlobalPipes(new ValidationPipe()) in main.ts','app.enableCors({ origin: http://localhost:5173 })','Verify 400 returned on invalid POST body','Test 404 on non-existent note id','Commit: feat: global validation and CORS'] },
      { id:'t13', name:'Category entity + CategoriesModule (Phase 2)', time:40, badge:'b-amber', tag:'Bonus',
        sub:['Create category.entity.ts with ManyToMany relation to Note','Update note.entity.ts with @ManyToMany(() => Category)','Create CategoriesController, CategoriesService','Add POST/DELETE /notes/:id/categories/:catId endpoints','Add GET /notes?categoryId filter in notes.service.ts','Commit: feat: categories module and note filtering'] },
      { id:'t14', name:'Backend smoke tests (curl or Postman)', time:20, badge:'b-green', tag:'Backend',
        sub:['POST /notes → 201 with body','GET /notes?archived=false → returns array','PUT /notes/:id → updates fields','PATCH /notes/:id/archive → toggles archived','DELETE /notes/:id → 204 no content','Document any failing tests before moving to frontend'] },
    ]
  },
  {
    id:'p2f', label:'Phase 2b — Frontend Build', color:'#BA7517', time:'5:30–8:30', badge:'b-amber',
    tasks:[
      { id:'t15', name:'Vite + React + TS scaffold + Tailwind setup', time:25, badge:'b-amber', tag:'Frontend',
        sub:['npm create vite@latest frontend -- --template react-ts','cd frontend && npm install','npm install axios tailwindcss @tailwindcss/vite','Configure tailwind.config.ts and add to vite.config.ts','Create CSS variables in index.css for color palette','Commit: feat: frontend scaffold with Tailwind'] },
      { id:'t16', name:'notesApi.ts — all Axios calls typed', time:25, badge:'b-amber', tag:'Frontend',
        sub:['Define Note and Category TypeScript interfaces','Create axios instance with baseURL http://localhost:3000','Export: getNotes(archived), createNote, updateNote, deleteNote, toggleArchive','Export: getCategories, addCategory, removeCategory','Commit: feat: typed API client'] },
      { id:'t17', name:'useNotes hook — state + CRUD operations', time:30, badge:'b-amber', tag:'Frontend',
        sub:['State: notes[], loading, error','fetchNotes(archived: boolean) on mount and after mutations','createNote, updateNote, deleteNote, toggleArchive — each calls API then refetches','Export hook to be used in App.tsx','Explain why custom hook over Redux: local state, no cross-component sharing needed','Commit: feat: useNotes custom hook'] },
      { id:'t18', name:'NoteCard + NoteList components', time:30, badge:'b-amber', tag:'Frontend',
        sub:['NoteCard: shows title, content preview, createdAt, Archive/Unarchive/Edit/Delete buttons','NoteCard: aria-label on all buttons, keyboard accessible','NoteList: maps notes[] to NoteCard, shows empty state','Tailwind: card with hover shadow, clean typography','Commit: feat: NoteCard and NoteList components'] },
      { id:'t19', name:'NoteForm modal (create + edit)', time:30, badge:'b-amber', tag:'Frontend',
        sub:['Controlled inputs for title (required) and content','Edit mode: pre-fill form with existing note data','Submit calls createNote or updateNote from useNotes','Close on success or cancel','Accessible: focus trap in modal, escape key closes','Commit: feat: NoteForm modal'] },
      { id:'t20', name:'App.tsx — tab bar + view routing', time:20, badge:'b-amber', tag:'Frontend',
        sub:['Active tab → NoteList with archived=false','Archived tab → NoteList with archived=true','Tab state: useState<"active"|"archived">','Create Note button only shows on Active tab','Commit: feat: App tab navigation'] },
      { id:'t21', name:'CategoryFilter component (Phase 2)', time:25, badge:'b-red', tag:'Bonus',
        sub:['Fetch categories via getCategories()','Render pill buttons: All + one per category','On click: pass categoryId to useNotes fetchNotes call','Active pill highlighted, All clears the filter','Commit: feat: category filter component'] },
    ]
  },
  {
    id:'p3', label:'Phase 3 — Testing, Docker & Ship', color:'#E24B4A', time:'8:30–10:00', badge:'b-red',
    tasks:[
      { id:'t22', name:'Backend unit tests (notes.service.spec.ts)', time:25, badge:'b-red', tag:'Testing',
        sub:['Mock NotesRepository with Jest','Test: createNote returns saved entity','Test: toggleArchive flips archived field','Test: deleteNote calls repo.delete','Test: findAll(archived) passes correct filter','npm run test — all pass','Commit: test: notes service unit tests'] },
      { id:'t23', name:'docker-compose.yml + start.sh', time:20, badge:'b-red', tag:'DevOps',
        sub:['docker-compose.yml: postgres service with healthcheck','docker-compose.yml: backend service (depends_on postgres, build ./backend)','docker-compose.yml: frontend service (build ./frontend)','start.sh: #!/bin/bash + docker-compose up --build','chmod +x start.sh','Test: docker-compose down -v && bash start.sh — full cold start','Commit: feat: docker-compose and start script'] },
      { id:'t24', name:'README.md final version', time:15, badge:'b-red', tag:'Required',
        sub:['Prerequisites: Node.js 20.x, npm 10.x, Docker 24.x, Docker Compose v2','Run section: bash start.sh (one command)','Architecture overview (3 lines max)','No login: note in README (no auth implemented)','Note: synchronize: true used for MVP (explain migration path)'] },
      { id:'t25', name:'Git hygiene check + final push', time:10, badge:'b-red', tag:'Git',
        sub:['git log --format="%an %ae" — confirm only your name/email','git status — confirm no .env, DEVLOG.md, claude.md, .claude/ committed','Review all commit messages: Conventional Commits format throughout','Final push to private repo','Tag: git tag v1.0.0 && git push --tags'] },
    ]
  }
];

let checks = {};
const container = document.getElementById('phases');
let totalMin = 0;

function computeTaskMin(task) {
  return task.sub ? task.sub.reduce((a,_,i) => a + Math.ceil(task.time / task.sub.length), 0) : task.time;
}

function renderAll() {
  totalMin = phases.reduce((a,p) => a + p.tasks.reduce((b,t) => b + t.time, 0), 0);
  document.getElementById('total-time').textContent = totalMin + ' min (~' + (totalMin/60).toFixed(1) + ' hrs)';

  let totalTasks = 0, doneTasks = 0;
  phases.forEach(p => { p.tasks.forEach(t => { totalTasks++; t.sub && t.sub.forEach((_,i) => { if(checks[t.id+'-'+i]) doneTasks++; }); }); });
  let totalSubs = 0;
  phases.forEach(p => p.tasks.forEach(t => { if(t.sub) totalSubs += t.sub.length; }));
  let doneSubs = Object.values(checks).filter(Boolean).length;
  document.getElementById('s-done').textContent = doneSubs;
  document.getElementById('s-total').textContent = totalSubs;
  let doneMin = 0;
  phases.forEach(p => p.tasks.forEach(t => {
    if(!t.sub) return;
    t.sub.forEach((_,i) => { if(checks[t.id+'-'+i]) doneMin += Math.ceil(t.time/t.sub.length); });
  }));
  document.getElementById('s-time').textContent = totalMin - doneMin;

  container.innerHTML = '';
  phases.forEach(ph => {
    let phSubs = 0, phDone = 0;
    ph.tasks.forEach(t => { if(t.sub) { phSubs += t.sub.length; t.sub.forEach((_,i) => { if(checks[t.id+'-'+i]) phDone++; }); } });
    const pct = phSubs ? Math.round(phDone/phSubs*100) : 0;

    const div = document.createElement('div');
    div.className = 'phase';
    const open = div.querySelector ? false : false;
    div.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <div class="phase-dot" style="background:${ph.color}"></div>
        <span class="phase-title">${ph.label}</span>
        <div class="phase-meta">
          <span class="phase-time">${ph.time}</span>
          <span class="badge ${ph.badge} phase-prog">${pct}%</span>
          <span class="chevron" id="chev-${ph.id}">▶</span>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${ph.color}"></div></div>
      <div class="task-list" id="tl-${ph.id}">
        ${ph.tasks.map(t => {
          const subDone = t.sub ? t.sub.filter((_,i) => checks[t.id+'-'+i]).length : 0;
          const allDone = t.sub ? subDone === t.sub.length : false;
          return `
          <div>
            <div class="task-row" onclick="toggleSubs('${t.id}')">
              <div class="task-check ${allDone?'done':''}"> ${allDone?'✓':''} </div>
              <div class="task-body">
                <div class="task-name ${allDone?'done':''}">${t.name}</div>
                ${t.sub ? `<div class="task-sub">${subDone}/${t.sub.length} subtasks · ${t.time} min</div>` : ''}
              </div>
              <div class="task-right">
                <span class="badge ${t.badge}">${t.tag}</span>
                <span class="min-label">${t.time}m</span>
                ${t.sub ? `<button class="expand-btn" id="exp-${t.id}">▶</button>` : ''}
              </div>
            </div>
            ${t.sub ? `<div class="subtask-list" id="sl-${t.id}">
              ${t.sub.map((s,i) => `
              <div class="subtask-row" onclick="toggleCheck('${t.id}',${i})">
                <div class="sub-check ${checks[t.id+'-'+i]?'done':''}">${checks[t.id+'-'+i]?'✓':''}</div>
                <span class="sub-name ${checks[t.id+'-'+i]?'done':''}">${s}</span>
                <span class="sub-min">${Math.ceil(t.time/t.sub.length)}m</span>
              </div>`).join('')}
            </div>` : ''}
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(div);
  });
}

function togglePhase(id) {
  const tl = document.getElementById('tl-'+id);
  const ch = document.getElementById('chev-'+id);
  const isOpen = tl.classList.contains('open');
  tl.classList.toggle('open', !isOpen);
  ch.classList.toggle('open', !isOpen);
}

function toggleSubs(taskId) {
  const sl = document.getElementById('sl-'+taskId);
  const ex = document.getElementById('exp-'+taskId);
  if(!sl) return;
  const isOpen = sl.classList.contains('open');
  sl.classList.toggle('open', !isOpen);
  if(ex) ex.textContent = isOpen ? '▶' : '▼';
}

function toggleCheck(taskId, idx) {
  event.stopPropagation();
  const key = taskId+'-'+idx;
  checks[key] = !checks[key];
  renderAll();
}

renderAll();
// Auto-open first phase
setTimeout(() => togglePhase('p1'), 50);
</script>
